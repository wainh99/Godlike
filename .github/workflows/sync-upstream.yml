name: Scheduled Sync

on:
  schedule:
    - cron: '0 0 * * *' # 每天 UTC 时间 0:00 运行一次
  workflow_dispatch:   # 允许你随时在 Actions 界面手动触发同步

jobs:
  sync_latest_from_upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          # 必须使用具有 push 权限的 token
          # 默认的 GITHUB_TOKEN 在大多数情况下足够
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream changes
        id: sync
        uses: aieri/sync-upstream-repo@v1.3.0
        with:
          upstream_repo: "oyz8/Godlike"
          upstream_branch: "main"
          target_branch: "main"
          force: false # 如果你没有在 fork 仓库改动代码，建议设为 false 以防误删
